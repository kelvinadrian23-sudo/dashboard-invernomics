<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reunión de equipo · Q2 2026 · Invernomics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#162A41; --navy2:#0D1F33; --navy3:#08131F;
  --lime:#C8D96A; --lime2:#B9C965; --lime-d:#7E8F35;
  --ink:#F0F4F8; --steel:#7A97B4;
  --bgblue:#EAF0F7; --bggreen:#F1F4DD; --red:#C0392B; --amber:#E8A33D;
  --gray:#5C6B7D; --white:#fff;
  --font-head:'Sora','Segoe UI',system-ui,-apple-system,Arial,sans-serif;
  --font-body:'Roboto','Segoe UI',system-ui,-apple-system,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-body);
  background:var(--navy3);color:var(--navy);overflow:hidden;
}
h1,h2,h3,.head h2,.head .kicker,.card .val,.card .lab,.bar .cap,.blabel,.chip,.divider .n,.takeaway .k,.timer,.fseg .pct,.hrow .num{font-family:var(--font-head)}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.slide{
  position:absolute;width:100%;height:100%;
  padding:4.2vh 5.2vw 8vh;
  background:var(--white);
  display:none;flex-direction:column;
  opacity:0;transform:translateY(14px);
  transition:opacity .45s ease,transform .45s ease;
}
.slide.active{display:flex;opacity:1;transform:translateY(0)}
.slide.dark{background:var(--navy);color:var(--white)}
.slide.dark h1,.slide.dark h2,.slide.dark h3{color:var(--white)}

/* header band */
.head{display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--lime);padding-bottom:12px;margin-bottom:2.6vh}
.head .kicker{font-size:1.05vw;letter-spacing:.18em;text-transform:uppercase;color:var(--lime-d);font-weight:700}
.head h2{font-size:2.5vw;font-weight:800;letter-spacing:.01em;line-height:1.05}
.logo{margin-left:auto}
.logo svg{display:block;height:5.4vh;width:auto}
.logo .brandimg{display:block;height:9vh;width:auto}
.logochip{display:inline-flex;background:#fff;border-radius:10px;padding:.7vh .9vw;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.logochip .brandimg{height:9vh}

h1{font-size:4.2vw;font-weight:800;line-height:1.04;letter-spacing:.005em}
h3{font-size:1.7vw;font-weight:700}
p,li{font-size:1.55vw;line-height:1.5;color:var(--navy)}
.slide.dark p,.slide.dark li{color:#dfe8f2}
.muted{color:var(--gray)}
.lime{color:var(--lime-d)}
.big-lime{color:var(--lime-d)}

/* chips */
.chip{display:inline-block;background:var(--lime);color:var(--navy);font-weight:700;border-radius:999px;padding:.35em 1em;font-size:1.15vw;letter-spacing:.05em}
.chip.navy{background:var(--navy);color:#fff}
.chip.ghost{background:transparent;border:2px solid var(--lime);color:var(--lime)}

/* footer */
.foot{position:absolute;left:0;bottom:0;width:100%;height:5vh;background:var(--navy2);
  display:flex;align-items:center;justify-content:space-between;padding:0 5.2vw;color:#7A97B4;font-size:.95vw}
.foot .brand{color:var(--lime);font-weight:700;letter-spacing:.1em}

/* progress + dots */
#bar{position:fixed;top:0;left:0;height:5px;background:var(--lime);z-index:50;transition:width .4s}
#dots{position:fixed;bottom:1.1vh;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:60}
#dots i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;transition:.2s}
#dots i.on{background:var(--lime);transform:scale(1.35)}
#hint{position:fixed;bottom:1.4vh;right:1.4vw;color:#7A97B4;font-size:.8vw;z-index:60}

/* cover */
.cover{background:var(--navy);color:#fff;justify-content:center;border-left:12px solid var(--lime)}
.cover h1{font-size:5vw;text-transform:uppercase;margin:2vh 0}
.cover .sub{font-size:1.7vw;color:#DDE8B0}

/* metric cards */
.grid{display:flex;gap:1.6vw;flex-wrap:wrap}
.card{flex:1;min-width:0;background:#fff;border:1px solid #e3e9f1;border-radius:16px;padding:2.2vh 1.6vw;
  box-shadow:0 8px 24px rgba(20,36,64,.06);position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:0;left:0;width:100%;height:6px;background:var(--navy)}
.card.good::before{background:var(--lime)}
.card.bad::before{background:var(--red)}
.card .lab{font-size:1.05vw;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.card .val{font-size:3.2vw;font-weight:800;line-height:1.05;margin-top:.4vh}
.card .delta{font-size:1.2vw;font-weight:700;margin-top:.4vh}
.up{color:var(--lime-d)} .down{color:var(--red)}

/* bar chart */
.chart{display:flex;align-items:flex-end;gap:2vw;height:42vh;padding:1vh 1vw 0;border-bottom:2px solid #dbe3ee}
.barwrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bar{width:70%;border-radius:10px 10px 0 0;position:relative;height:0;transition:height 1s cubic-bezier(.2,.8,.2,1);display:flex;align-items:flex-start;justify-content:center}
.bar .cap{position:absolute;top:-3.6vh;font-weight:800;font-size:1.25vw;white-space:nowrap}
.bar.q1{background:linear-gradient(180deg,#2C4B73,#162A41)}
.bar.q2{background:linear-gradient(180deg,#B9C965,#7E8F35)}
.blabel{margin-top:1vh;font-size:1.2vw;font-weight:700;color:var(--navy)}
.active .bar{height:var(--h)}

/* segmented toggle */
.seg-wrap{display:flex;gap:.8vw;margin-bottom:1.8vh}
.seg{font-family:var(--font-body);font-size:1.15vw;font-weight:700;padding:.5em 1.3em;border-radius:999px;border:2px solid #d3dbe6;background:#fff;color:var(--navy);cursor:pointer;transition:.15s}
.seg:hover{border-color:var(--lime)}
.seg.on{background:var(--navy);border-color:var(--navy);color:#fff}

/* horizontal conversion bars */
.hbars{display:flex;flex-direction:column;gap:1.5vh;margin-top:1vh}
.hrow{display:grid;grid-template-columns:15vw 1fr auto;align-items:center;gap:1vw}
.hrow .name{font-weight:700;font-size:1.35vw;text-align:right}
.htrack{background:#eef2f7;border-radius:999px;height:3.2vh;overflow:hidden}
.hfill{height:100%;width:0;border-radius:999px;transition:width 1.1s cubic-bezier(.2,.8,.2,1);background:var(--lime-d)}
.hfill.low{background:var(--red)}
.hfill.mid{background:var(--amber)}
.active .hfill{width:var(--w)}
.hrow .num{font-weight:800;font-size:1.4vw;min-width:5vw}
.hrow .vol{font-size:.95vw;color:var(--gray);font-weight:600}

/* note boxes */
.note{border-radius:14px;padding:1.8vh 1.6vw;font-size:1.4vw;line-height:1.45;margin-top:2vh}
.note.key{background:var(--bgblue);border-left:6px solid var(--navy)}
.note.ok{background:var(--bggreen);border-left:6px solid var(--lime)}
.note.warn{background:#fbeee0;border-left:6px solid var(--amber)}
.note.bad{background:#f8e4e1;border-left:6px solid var(--red)}
.note b{color:var(--navy)}

/* agenda / lists */
.agenda{display:flex;flex-direction:column;gap:1.3vh;margin-top:1vh}
.arow{display:flex;align-items:center;gap:1.2vw;background:#f6f9fc;border-radius:12px;padding:1.4vh 1.4vw;
  border-left:5px solid var(--navy);opacity:.35;transform:translateX(-8px);transition:.4s}
.active .arow{opacity:1;transform:translateX(0)}
.arow .t{background:var(--navy);color:#fff;font-weight:800;border-radius:8px;padding:.3em .7em;font-size:1.15vw;min-width:5.5vw;text-align:center}
.arow.hl{border-left-color:var(--lime)} .arow.hl .t{background:var(--lime-d)}
.arow .dot{width:.9vw;height:.9vw;border-radius:50%;background:var(--navy);flex:0 0 auto}
.arow.hl .dot{background:var(--lime-d)}
.arow span.txt{font-size:1.45vw;font-weight:600}

ul.clean{list-style:none;margin-top:1vh}
ul.clean li{position:relative;padding-left:2.2vw;margin-bottom:1.5vh;font-size:1.55vw}
ul.clean li::before{content:"";position:absolute;left:0;top:.55em;width:1.1vw;height:1.1vw;background:var(--lime);border-radius:3px}

/* section divider */
.divider{background:var(--navy);color:#fff;justify-content:center;border-left:12px solid var(--lime)}
.divider .n{font-size:9vw;font-weight:800;color:rgba(200,217,106,.32);line-height:.8}
.divider h1{font-size:4vw;margin-top:-2vh}

/* interactive buttons/reveal */
.reveal{margin-top:2vh;display:none}
.reveal.show{display:block;animation:fade .5s}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.btn{background:var(--lime);color:#fff;border:none;border-radius:10px;padding:1.1vh 1.8vw;font-size:1.3vw;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.btn:hover{background:var(--lime-d)}
.btn.navy{background:var(--navy)} .btn.navy:hover{background:var(--navy2)}

/* poll */
.poll{display:flex;flex-direction:column;gap:1.4vh;margin-top:2vh}
.poll .opt{display:grid;grid-template-columns:1fr;background:#f6f9fc;border:2px solid #e3e9f1;border-radius:12px;
  padding:1.3vh 1.4vw;cursor:pointer;position:relative;overflow:hidden;transition:.2s}
.poll .opt:hover{border-color:var(--lime)}
.poll .opt .fillp{position:absolute;inset:0;background:rgba(125,181,64,.18);width:0;transition:width .5s}
.poll .opt .lbl{position:relative;font-size:1.4vw;font-weight:700;display:flex;justify-content:space-between}

/* timer */
.timer{font-size:6vw;font-weight:800;color:var(--navy);text-align:center;margin:2vh 0}
.timer.run{color:var(--lime-d)}
.timerbtns{display:flex;gap:1vw;justify-content:center}

/* two col */
.two{display:grid;grid-template-columns:1fr 1fr;gap:2vw;align-items:start}

/* funnel */
.funnel{display:flex;flex-direction:column;align-items:center;gap:1vh;margin-top:1.5vh}
.fseg{color:#fff;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.2vh;padding:1.6vh 1vw;transition:width 1s,opacity 1s;opacity:0;width:0;
  box-shadow:0 6px 16px rgba(20,36,64,.18);text-align:center}
.active .fseg{opacity:1}
.fseg .pct{font-weight:800;font-size:1.9vw;line-height:1}
.fseg .lbl2{font-size:1.15vw;font-weight:600;opacity:.92}
.fseg.indent{margin-left:8vw}
.big-num{font-size:2vw}
.arow .dot{flex:0 0 auto;width:1.1vw;height:1.1vw;background:var(--navy);border-radius:50%}
.arow.hl .dot{background:var(--lime)}

.takeaway{display:flex;align-items:center;gap:1.4vw;background:var(--navy);color:#fff;border-radius:14px;padding:2vh 1.8vw;margin-bottom:1.6vh;opacity:0;transform:translateX(-10px);transition:.5s}
.active .takeaway{opacity:1;transform:none}
.takeaway .k{background:var(--lime);color:#fff;font-weight:800;font-size:2vw;border-radius:10px;min-width:3.4vw;height:3.4vw;display:flex;align-items:center;justify-content:center}
.takeaway p{color:#fff;font-size:1.7vw;font-weight:600}
</style>
</head>

/* ================= ENGINE ================= */
const stage=document.getElementById('stage');
const dotsC=document.getElementById('dots');
const barEl=document.getElementById('bar');
let cur=0;
stage.innerHTML=slides.map((s,i)=>s.replace('class="slide','id="s'+i+'" class="slide')).join('');
slides.forEach((_,i)=>{const d=document.createElement('i');d.onclick=()=>go(i);dotsC.appendChild(d);});
const slideEls=[...document.querySelectorAll('.slide')];
const dotEls=[...dotsC.children];

function go(n){
  n=Math.max(0,Math.min(slides.length-1,n));
  slideEls[cur].classList.remove('active');
  dotEls[cur].classList.remove('on');
  cur=n;
  slideEls[cur].classList.add('active');
  dotEls[cur].classList.add('on');
  barEl.style.width=((cur)/(slides.length-1)*100)+'%';
  if(cur===4 && document.getElementById('factchart')){renderFact(curFv);}
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){go(cur+1);e.preventDefault();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){go(cur-1);}
  else if(e.key==='f'||e.key==='F'){toggleFS();}
  else if(e.key==='Home'){go(0);} else if(e.key==='End'){go(slides.length-1);}
});
function toggleFS(){ if(!document.fullscreenElement){document.documentElement.requestFullscreen();}else{document.exitFullscreen();} }
let tx=0;
stage.addEventListener('touchstart',e=>tx=e.changedTouches[0].clientX,{passive:true});
stage.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>50){go(cur+(dx<0?1:-1));}},{passive:true});
function toggleReveal(id,btn){const r=document.getElementById(id);r.classList.toggle('show');btn.textContent=r.classList.contains('show')?'Ocultar ▴':'Ver cómo conducir la ronda ▾';}
let tint=null,tleft=300;
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function startTimer(){const el=document.getElementById('tmr');el.classList.add('run');if(tint)clearInterval(tint);tint=setInterval(()=>{tleft--;el.textContent=fmt(tleft);if(tleft<=0){clearInterval(tint);el.textContent='¡Tiempo!';}},1000);}
function resetTimer(){if(tint)clearInterval(tint);tleft=300;const el=document.getElementById('tmr');el.textContent='05:00';el.classList.remove('run');}
const votes=[0,0,0];
function vote(el){const opts=[...document.querySelectorAll('#poll1 .opt')];const i=opts.indexOf(el);votes[i]++;const tot=votes.reduce((a,b)=>a+b,0);opts.forEach((o,j)=>{const pc=Math.round(votes[j]/tot*100);o.querySelector('.fillp').style.width=pc+'%';o.querySelector('.pc').textContent=pc+'%';});}
let curFv='trimestral';
const FACT={
 mensual:{bars:[['Ene',60000,'q1'],['Feb',17300,'q1'],['Mar',42500,'q1'],['Abr',14300,'q2'],['May',26700,'q2'],['Jun',51500,'q2']],
  note:`<b>Facturación mensual del equipo · 2026.</b> Enero (60.000 €) y junio (51.500 €) los más fuertes; febrero y abril, los más flojos. Azul = meses del Q1, verde = meses del Q2. La estacionalidad se nota: hay que empujar los meses valle.`},
 trimestral:{bars:[['Q3 2025 · 14 ops',63965,'q1'],['Q4 2025 · 20 ops',95600,'q1'],['Q1 2026 · 28 ops',119800,'q1'],['Q2 2026 · 22 ops',92500,'q2']],
  note:`<b>El equipo al completo</b> (Flor, Facundo, Isled, David y Kelvin), últimos 4 trimestres: 63.965 € → 95.600 € → 119.800 € → 92.500 €. Tendencia claramente ascendente hasta el Q1; en el Q2 baja algo, pero con un pipeline récord — buena parte de los cierres se han desplazado al Q3.`},
 semestral:{bars:[['S2 2025',159565,'q1'],['S1 2026',212300,'q1'],['S2 2026 · en curso',8500,'q2']],
  note:`<b>S1 2026 cerró en 212.300 €:</b> +33% sobre el S2 2025 (159.565 €) y +175% sobre el S1 2025 (77.200 €). El S2 2026 acaba de arrancar (8.500 € los primeros días). Crecimiento sólido, semestre a semestre.`}
};
function eur(n){return String(n).replace(/\B(?=(\d{3})+(?!\d))/g,'.')+' €';}
function renderFact(view){
  curFv=view; const d=FACT[view]; if(!d)return;
  const max=Math.max.apply(null,d.bars.map(b=>b[1]));
  const chart=document.getElementById('factchart'); if(!chart)return;
  chart.innerHTML=d.bars.map(b=>{const hh=Math.round(b[1]/max*90);return '<div class="barwrap"><div class="bar '+b[2]+'" style="height:0" data-h="'+hh+'"><span class="cap">'+eur(b[1])+'</span></div><div class="blabel">'+b[0]+'</div></div>';}).join('');
  const nt=document.getElementById('factnote'); if(nt)nt.innerHTML=d.note;
  document.querySelectorAll('.seg[data-fv]').forEach(x=>x.classList.toggle('on',x.dataset.fv===view));
  requestAnimationFrame(()=>requestAnimationFrame(()=>{chart.querySelectorAll('.bar').forEach(el=>{el.style.height=el.dataset.h+'%';});}));
}
go(0);
</script>
